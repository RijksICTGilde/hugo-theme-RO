<header class="mox-page-grid">
  <div style="grid-column: page; display: flex; align-items: center; gap: var(--mox-space-sm); padding-block: var(--mox-space-sm);">
    <a href="{{ "/" | relURL }}">
      <img
        src="{{ "images/logo-rijksoverheid.svg" | relURL }}"
        alt="Logo Rijksoverheid"
        class="mox-site-header-logo-rijksoverheid"
      >
    </a>
    {{ with .Site.Title }}<span class="site-title">{{ . }}</span>{{ end }}
    {{- if site.Params.search.enable -}}
    <form class="mox-search" role="search" action="{{ "search/" | relURL }}" method="get">
      <label for="mox-search-input" class="mox-visually-hidden">Zoeken</label>
      <input id="mox-search-input" type="search" name="q" placeholder="Vul in wat u zoekt" autocomplete="off">
      <button type="submit">Zoeken</button>
    </form>
    {{- end -}}
  </div>
  {{ with site.Menus.main }}
  <nav style="grid-column: page;" aria-label="Hoofdnavigatie">
    <ul style="display: flex; gap: var(--mox-space-sm); list-style: none; padding: 0; margin: 0;">
      {{ range . }}
      <li>
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </nav>
  {{ end }}
</header>
