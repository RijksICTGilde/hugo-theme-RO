{{- if not .IsHome -}}
<nav class="mox-page-grid mox-breadcrumbs" aria-label="Kruimelpad">
  <ol>
    <li><a href="{{ "/" | relURL }}">Home</a></li>
    {{- $ancestors := .Ancestors.Reverse -}}
    {{- range $ancestors -}}
      {{- if not .IsHome -}}
      <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
      {{- end -}}
    {{- end -}}
    <li><span aria-current="page">{{ .LinkTitle }}</span></li>
  </ol>
</nav>
{{- end -}}
