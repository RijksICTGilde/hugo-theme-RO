name: Sync MOx CSS

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone latest moza-poc
        run: git clone --depth 1 https://github.com/MinBZK/moza-poc.git /tmp/moza-poc

      - name: Sync CSS files
        run: |
          rm -rf static/style
          mkdir -p static/style
          cp /tmp/moza-poc/style/style.css static/style/
          cp /tmp/moza-poc/style/_toepassing.css static/style/
          cp /tmp/moza-poc/style/_rijkshuisstijl.css static/style/
          cp /tmp/moza-poc/style/_reset.css static/style/

      - name: Sync assets
        run: |
          rm -rf static/assets
          cp -r /tmp/moza-poc/assets static/assets

      - name: Sync design tokens
        run: |
          rm -rf tokens
          mkdir -p tokens
          cp /tmp/moza-poc/tokens/tokens.json tokens/

      - name: Sync storybook stories
        run: |
          rm -rf stories
          cp -r /tmp/moza-poc/stories stories

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update MOx CSS and assets to latest version"
          title: "Update MOx CSS and assets to latest version"
          body: |
            Automated sync of MOx design system CSS, assets, tokens, and stories from
            [MinBZK/moza-poc](https://github.com/MinBZK/moza-poc).
          branch: sync-mox-css
          delete-branch: true
